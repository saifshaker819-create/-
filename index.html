<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#4f8ef7">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="غيابات طب الأسنان">
<link rel="manifest" href="manifest.json">
<title>نظام غيابات - كلية طب الأسنان / جامعة ذي قار</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{--bg:#0f1117;--bg2:#151822;--bg3:#1c2030;--glass:rgba(255,255,255,0.05);--glass2:rgba(255,255,255,0.08);--glass3:rgba(255,255,255,0.12);--border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);--accent:#4f8ef7;--accent2:#6ee7b7;--accent3:#f472b6;--accent4:#fbbf24;--text:#e8eaf0;--text2:#9ca3af;--text3:#6b7280;--present:#10b981;--absent:#ef4444;--shadow:0 8px 32px rgba(0,0,0,0.4);--shadow2:0 2px 12px rgba(0,0,0,0.3);--radius:16px;--radius2:12px;--transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
.light-mode{--bg:#eef2f9;--bg2:#e2e8f5;--bg3:#d6deee;--glass:rgba(255,255,255,0.6);--glass2:rgba(255,255,255,0.75);--glass3:rgba(255,255,255,0.9);--border:rgba(100,130,200,0.2);--border2:rgba(100,130,200,0.35);--text:#1a2035;--text2:#4a5568;--text3:#718096;--shadow:0 8px 32px rgba(80,100,160,0.15);--shadow2:0 2px 12px rgba(80,100,160,0.1)}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:17px}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:var(--transition);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,rgba(79,142,247,0.12) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 90%,rgba(110,231,183,0.08) 0%,transparent 60%);pointer-events:none;z-index:0}

/* SYNC STATUS */
.sync-bar{position:fixed;top:0;left:0;right:0;z-index:200;height:3px;background:transparent;transition:all .3s}
.sync-bar.syncing{background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:syncAnim 1.5s infinite}
.sync-bar.error{background:var(--absent)}
.sync-bar.ok{background:var(--present);animation:fadeOut 2s forwards}
@keyframes syncAnim{0%{background-position:-200px 0}100%{background-position:200px 0}}
@keyframes fadeOut{0%{opacity:1}80%{opacity:1}100%{opacity:0}}
.sync-indicator{position:fixed;bottom:80px;left:20px;z-index:300;display:flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:8px 14px;font-size:12px;font-weight:600;box-shadow:var(--shadow2);transition:var(--transition)}
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--text3)}
.sync-dot.online{background:var(--present);animation:pulse 2s infinite}
.sync-dot.syncing{background:var(--accent);animation:pulse .8s infinite}
.sync-dot.offline{background:var(--absent)}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(1.3)}}

.header{position:sticky;top:0;z-index:100;background:var(--glass2);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:64px;box-shadow:var(--shadow2)}
.header-logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(79,142,247,0.4)}
.logo-text{font-size:15px;font-weight:700;line-height:1.3}
.logo-sub{font-size:11px;color:var(--text2);font-weight:400}
.header-actions{display:flex;align-items:center;gap:10px}
.btn-icon{width:38px;height:38px;border-radius:10px;background:var(--glass2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:var(--transition);font-size:17px;color:var(--text2)}
.btn-icon:hover{background:var(--glass3);color:var(--text);transform:scale(1.05)}
.app{position:relative;z-index:1;display:flex;flex-direction:column;min-height:calc(100vh - 64px)}
.nav-tabs{display:flex;gap:4px;padding:16px 24px 0;border-bottom:1px solid var(--border);background:var(--glass);backdrop-filter:blur(10px);overflow-x:auto}
.nav-tab{padding:9px 20px;border-radius:10px 10px 0 0;background:transparent;border:1px solid transparent;border-bottom:none;color:var(--text2);cursor:pointer;transition:var(--transition);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:500;white-space:nowrap}
.nav-tab:hover{background:var(--glass2);color:var(--text)}
.nav-tab.active{background:var(--glass3);border-color:var(--border2);color:var(--accent);font-weight:700}
.page{display:none;padding:24px}
.page.active{display:block}
.breadcrumb{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.bc-item{font-size:13px;color:var(--text2);cursor:pointer;padding:4px 10px;border-radius:6px;transition:var(--transition)}
.bc-item:hover{color:var(--accent);background:var(--glass)}
.bc-item.active{color:var(--text);font-weight:600;cursor:default}
.bc-sep{color:var(--text3);font-size:12px}
.cards-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px}
.cards-title{font-size:20px;font-weight:800}
.cards-title span{color:var(--accent)}
.btn-add{display:flex;align-items:center;gap:8px;padding:9px 18px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6ba3ff);border:none;color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition);box-shadow:0 4px 12px rgba(79,142,247,0.35)}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(79,142,247,0.5)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.card{background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;cursor:pointer;transition:var(--transition);backdrop-filter:blur(10px);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent);pointer-events:none}
.card:hover{transform:translateY(-4px);border-color:var(--border2);box-shadow:var(--shadow)}
.card-icon{font-size:32px;margin-bottom:12px}
.card-name{font-size:16px;font-weight:700;margin-bottom:4px}
.card-meta{font-size:12px;color:var(--text2)}
.card-actions{position:absolute;top:10px;left:10px;display:flex;gap:4px;opacity:0;transition:var(--transition)}
.card:hover .card-actions{opacity:1}
.card-action-btn{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:var(--transition);border:none}
.ca-edit{background:rgba(251,191,36,0.2);color:var(--accent4)}
.ca-del{background:rgba(239,68,68,0.2);color:var(--absent)}
.ca-edit:hover{background:rgba(251,191,36,0.4)}
.ca-del:hover{background:rgba(239,68,68,0.4)}
.card-accent{position:absolute;bottom:0;right:0;width:60px;height:60px;border-radius:50% 0 var(--radius) 0;opacity:.15}
.color-0{background:linear-gradient(135deg,#4f8ef7,#6ee7b7)}
.color-1{background:linear-gradient(135deg,#f472b6,#fb923c)}
.color-2{background:linear-gradient(135deg,#a78bfa,#60a5fa)}
.color-3{background:linear-gradient(135deg,#34d399,#059669)}
.color-4{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.att-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap}
.att-info{flex:1;background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius2);padding:14px 18px}
.att-info h2{font-size:18px;font-weight:800;margin-bottom:4px}
.att-info p{font-size:12px;color:var(--text2)}
.att-stats{display:flex;gap:10px;flex-wrap:wrap}
.stat-box{background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius2);padding:12px 18px;text-align:center;min-width:80px}
.stat-num{font-size:24px;font-weight:800}
.stat-num.green{color:var(--present)}
.stat-num.red{color:var(--absent)}
.stat-label{font-size:11px;color:var(--text2);margin-top:2px}
.btn-save-all{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,var(--present),#059669);border:none;color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:var(--transition);box-shadow:0 4px 12px rgba(16,185,129,0.35)}
.btn-save-all:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(16,185,129,0.5)}
.att-date-info{background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius2);padding:8px 14px;font-size:12px;color:var(--text2);text-align:center;min-width:140px}
.att-date-info strong{color:var(--text);display:block;font-size:14px}
.search-bar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.search-input{flex:1;min-width:200px;background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:10px 16px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:var(--transition)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.15)}
.search-input::placeholder{color:var(--text3)}
.table-wrap{overflow-x:auto;border-radius:var(--radius);border:1px solid var(--border)}
.att-table{width:100%;border-collapse:collapse}
.att-table thead{background:var(--glass3)}
.att-table th{padding:12px 16px;font-size:13px;font-weight:700;color:var(--text2);text-align:right;border-bottom:1px solid var(--border);white-space:nowrap}
.att-table tbody tr{transition:var(--transition)}
.att-table tbody tr:hover{background:var(--glass)}
.att-table tbody tr:not(:last-child) td{border-bottom:1px solid var(--border)}
.att-table td{padding:12px 16px;font-size:14px}
.row-num{color:var(--text3);font-size:12px}
.student-name{font-weight:600}
.att-toggle{display:flex;gap:6px;align-items:center}
.att-btn{padding:6px 14px;border-radius:8px;border:1.5px solid;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition)}
.att-btn.present-btn{border-color:var(--present);color:var(--present);background:transparent}
.att-btn.present-btn.active,.att-btn.present-btn:hover{background:var(--present);color:#fff}
.att-btn.absent-btn{border-color:var(--absent);color:var(--absent);background:transparent}
.att-btn.absent-btn.active,.att-btn.absent-btn:hover{background:var(--absent);color:#fff}
.note-input{background:var(--glass);border:1px solid var(--border);border-radius:8px;padding:6px 10px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:12px;outline:none;width:180px;transition:var(--transition)}
.note-input:focus{border-color:var(--accent2)}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:12px;font-weight:600}
.badge-present{background:rgba(16,185,129,.15);color:var(--present)}
.badge-absent{background:rgba(239,68,68,.15);color:var(--absent)}
.badge-pending{background:rgba(156,163,175,.15);color:var(--text2)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:16px}
.modal-overlay.open{display:flex;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--radius);padding:28px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.modal-title{font-size:18px;font-weight:800;margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.form-group{margin-bottom:16px}
.form-label{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block}
.form-input,.form-select{width:100%;background:var(--glass2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:var(--transition)}
.form-input:focus,.form-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,142,247,.12)}
.form-select option{background:var(--bg2)}
.modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
.btn-cancel{padding:9px 20px;border-radius:10px;background:var(--glass);border:1px solid var(--border);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:var(--transition)}
.btn-cancel:hover{background:var(--glass2);color:var(--text)}
.btn-confirm{padding:9px 20px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6ba3ff);border:none;color:#fff;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:var(--transition)}
.btn-confirm:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,142,247,.4)}
.settings-section{margin-bottom:30px}
.settings-section h3{font-size:16px;font-weight:800;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--accent)}
.settings-list{display:flex;flex-direction:column;gap:8px}
.settings-item{display:flex;align-items:center;justify-content:space-between;background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius2);padding:12px 16px;transition:var(--transition)}
.settings-item:hover{border-color:var(--border2)}
.si-info{font-size:14px;font-weight:600}
.si-meta{font-size:12px;color:var(--text2);margin-top:2px}
.si-actions{display:flex;gap:6px}
.si-btn{padding:5px 12px;border-radius:7px;font-family:'Tajawal',sans-serif;font-size:12px;font-weight:600;cursor:pointer;transition:var(--transition);border:none}
.si-edit{background:rgba(251,191,36,.15);color:var(--accent4)}
.si-edit:hover{background:rgba(251,191,36,.3)}
.si-del{background:rgba(239,68,68,.15);color:var(--absent)}
.si-del:hover{background:rgba(239,68,68,.3)}
.reports-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.report-card{background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;transition:var(--transition)}
.report-card:hover{border-color:var(--border2);box-shadow:var(--shadow2)}
.report-card h4{font-size:15px;font-weight:700;margin-bottom:6px}
.report-card p{font-size:12px;color:var(--text2);margin-bottom:14px}
.btn-export{display:flex;align-items:center;gap:8px;padding:9px 16px;border-radius:9px;background:linear-gradient(135deg,#059669,#10b981);border:none;color:#fff;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:var(--transition);width:100%;justify-content:center}
.btn-export:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(16,185,129,.35)}
.history-list{display:flex;flex-direction:column;gap:10px;max-height:400px;overflow-y:auto}
.history-item{background:var(--glass2);border:1px solid var(--border);border-radius:var(--radius2);padding:12px 16px}
.hi-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.hi-name{font-size:14px;font-weight:700}
.hi-date{font-size:11px;color:var(--text2)}
.hi-detail{font-size:12px;color:var(--text2)}
.toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:12px;padding:12px 18px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px;box-shadow:var(--shadow);min-width:220px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{border-right:3px solid var(--present)}
.toast.error{border-right:3px solid var(--absent)}
.toast.info{border-right:3px solid var(--accent)}
.empty-state{text-align:center;padding:60px 20px;color:var(--text2)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px;opacity:.4}
.empty-state p{font-size:14px}
/* PWA INSTALL BANNER */
.pwa-banner{position:fixed;bottom:0;left:0;right:0;z-index:9998;background:linear-gradient(135deg,var(--bg2),var(--bg3));border-top:1px solid var(--border2);padding:16px 20px;display:flex;align-items:center;gap:14px;box-shadow:0 -8px 32px rgba(0,0,0,0.4);transform:translateY(100%);transition:transform 0.5s cubic-bezier(0.4,0,0.2,1);backdrop-filter:blur(20px)}
.pwa-banner.show{transform:translateY(0)}
.pwa-banner-icon{width:56px;height:56px;border-radius:14px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;box-shadow:0 4px 16px rgba(79,142,247,0.5)}
.pwa-banner-text{flex:1}
.pwa-banner-title{font-size:15px;font-weight:800;color:var(--text);margin-bottom:3px}
.pwa-banner-sub{font-size:12px;color:var(--text2);line-height:1.4}
.pwa-banner-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.pwa-install-btn{padding:9px 18px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#6ba3ff);border:none;color:#fff;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:var(--transition);box-shadow:0 4px 12px rgba(79,142,247,0.4);white-space:nowrap}
.pwa-install-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(79,142,247,0.6)}
.pwa-dismiss-btn{padding:9px 14px;border-radius:10px;background:var(--glass2);border:1px solid var(--border);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap}
.pwa-dismiss-btn:hover{background:var(--glass3);color:var(--text)}
@media(max-width:500px){.pwa-banner{flex-wrap:wrap}.pwa-banner-actions{width:100%;justify-content:stretch}.pwa-install-btn,.pwa-dismiss-btn{flex:1;text-align:center}}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.att-tabs{display:flex;gap:6px;margin-bottom:16px}
.att-tab{padding:7px 16px;border-radius:9px;background:var(--glass);border:1px solid var(--border);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:var(--transition)}
.att-tab.active{background:var(--glass3);border-color:var(--accent);color:var(--accent)}
@media(max-width:600px){.header{padding:0 14px}.page{padding:14px}.cards-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}.att-stats{flex-direction:column}.note-input{width:120px}}
</style>
</head>
<body>
<div class="sync-bar" id="syncBar"></div>

<header class="header">
  <div class="header-logo">
    <div class="logo-icon">🦷</div>
    <div>
      <div class="logo-text">نظام غيابات الطلاب</div>
      <div class="logo-sub">كلية طب الأسنان — جامعة ذي قار</div>
    </div>
  </div>
  <div class="header-actions">
    <div id="clockDisplay" style="font-size:12px;color:var(--text2);text-align:center;line-height:1.4;"></div>
    <button class="btn-icon" id="themeToggle" onclick="toggleTheme()">🌙</button>
  </div>
</header>

<div class="app">
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('stages')">📚 المراحل</button>
    <button class="nav-tab" onclick="showTab('history')">📋 سجل الغيابات</button>
    <button class="nav-tab" onclick="showTab('settings')">⚙️ الإعدادات</button>
  </div>
  <div class="page active" id="page-stages">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div id="content-area"></div>
  </div>
  <div class="page" id="page-history">
    <div class="cards-header"><div class="cards-title">📋 سجل جميع الغيابات</div></div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end;">
      <div style="display:flex;flex-direction:column;gap:4px;flex:1;min-width:140px">
        <label style="font-size:12px;color:var(--text2);font-weight:600">المرحلة</label>
        <select class="form-select" id="hist-stage" onchange="onHistStageChange()" style="padding:8px 12px;">
          <option value="">كل المراحل</option>
        </select>
      </div>

<script>
// ===================== FIREBASE CONFIG =====================
const firebaseConfig = {

// ===================== PENDING SESSIONS — IndexedDB Persistent Timer =====================
window._pendingSessions = {};
window._sessionAtt = window._sessionAtt || {};

// ---- IndexedDB + PIN protection ----
const IDB_NAME  = 'dentalPendingDB';
const IDB_STORE = 'pendingSessions';
const IDB_PIN   = 'student0191';
let idb = null;

function openIDB() {
  return new Promise(function(resolve, reject) {
    if (idb) { resolve(idb); return; }
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = function(e) {
      const d = e.target.result;
      if (!d.objectStoreNames.contains(IDB_STORE))
        d.createObjectStore(IDB_STORE, { keyPath: 'sessKey' });
    };
    req.onsuccess = function(e) { idb = e.target.result; resolve(idb); };
    req.onerror   = function()  { reject(req.error); };
  });
}

// تشفير XOR بالرمز السري قبل الحفظ في IDB
function idbEncrypt(obj) {
  const str = JSON.stringify(obj);
  let out = '';
  for (let i = 0; i < str.length; i++)
    out += String.fromCharCode(str.charCodeAt(i) ^ IDB_PIN.charCodeAt(i % IDB_PIN.length));
  return btoa(unescape(encodeURIComponent(out)));
}
function idbDecrypt(enc) {
  try {
    const str = decodeURIComponent(escape(atob(enc)));
    let out = '';
    for (let i = 0; i < str.length; i++)
      out += String.fromCharCode(str.charCodeAt(i) ^ IDB_PIN.charCodeAt(i % IDB_PIN.length));
    return JSON.parse(out);
  } catch(e) { return null; }
}

function idbSaveSession(sessKey, data) {
  openIDB().then(function(d) {
    d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE)
      .put({ sessKey: sessKey, payload: idbEncrypt(data) });
  }).catch(function(){});
}
function idbDeleteSession(sessKey) {
  openIDB().then(function(d) {
    d.transaction(IDB_STORE,'readwrite').objectStore(IDB_STORE).delete(sessKey);
  }).catch(function(){});
}
function idbGetAllSessions() {
  return openIDB().then(function(d) {
    return new Promise(function(resolve, reject) {
      const req = d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).getAll();
      req.onsuccess = function() {
        const rows = (req.result||[]).map(function(r){
          const dec = idbDecrypt(r.payload);
          return dec ? Object.assign({ sessKey: r.sessKey }, dec) : null;
        }).filter(Boolean);
        resolve(rows);
      };
      req.onerror = function() { reject(req.error); };
    });
  });
}

// ---- مركزية الإرسال النهائي ----
function _fireSyncForSession(sessKey, session, subjectId, groupId) {
  // قفل السجلات في state
  (state.attendance||[]).forEach(function(a){
    if (a.session===session) { a.synced=true; a.locked=true; }
  });
  // تنظيف
  delete window._sessionAtt[sessKey];
  if (window._pendingSessions[sessKey]) {
    clearTimeout(window._pendingSessions[sessKey].timer);
    delete window._pendingSessions[sessKey];
  }
  idbDeleteSession(sessKey);

  if (isOnline) {
    setSyncStatus('syncing', 'جاري مزامنة الغيابات...');
    db.ref('dentalData').set(state)
      .then(function() {
        setSyncStatus('online', 'تمت المزامنة ✓');
        save(true);
        toast('🔒 انتهت مدة التعديل — تم الإرسال لـ Firebase وقُفل السجل نهائياً','info');
      })
      .catch(function() {
        setSyncStatus('offline', 'خطأ في المزامنة');
        save(true);
      });
  } else {
    save(true);
    toast('🔒 انتهى وقت التعديل — محفوظ محلياً وسيُرسل عند الاتصال','info');
  }
  if (nav.subject===subjectId && nav.group===groupId)
    renderAttendance(subjectId, groupId);
}

function scheduleFirebaseSync(session, subjectId, groupId) {
  const DELAY   = 15 * 60 * 1000;
  const sessKey = subjectId + '-' + groupId;

  // إلغاء المؤقت القديم إن وجد
  if (window._pendingSessions[sessKey])
    clearTimeout(window._pendingSessions[sessKey].timer);

  const startedAt = Date.now();
  idbSaveSession(sessKey, { session, subjectId, groupId, startedAt, delay: DELAY });

  const timer = setTimeout(function() {
    _fireSyncForSession(sessKey, session, subjectId, groupId);
  }, DELAY);

  window._pendingSessions[sessKey] = { session, subjectId, groupId, timer, startedAt, delay: DELAY };
}

// ---- استعادة بعد الريفريش ----
function restorePendingTimers() {
  const EDIT_MS = 15 * 60 * 1000;
  const now = Date.now();

  // أولاً: استعادة _sessionAtt فوراً من state (بدون انتظار IDB)
  (state.attendance||[]).forEach(function(a) {
    if (!a.locked && a.savedAt && (now - a.savedAt < EDIT_MS)) {
      const key = a.subjectId + '-' + a.groupId;
      if (!window._sessionAtt[key]) window._sessionAtt[key] = {};
      window._sessionAtt[key][a.studentId] = a.status;
      if (a.note) window._sessionAtt[key][a.studentId+'_note'] = a.note;
    }
  });

  // ثانياً: استعادة المؤقتات من IDB
  idbGetAllSessions().then(function(rows) {
    rows.forEach(function(row) {
      const sessKey  = row.sessKey;
      const elapsed  = now - row.startedAt;
      const remaining = EDIT_MS - elapsed;

      if (remaining <= 0) {
        // انتهى الوقت أثناء الريفريش → أرسل فوراً
        const rec = (state.attendance||[]).find(function(a){
          return String(a.subjectId)===String(row.subjectId) &&
                 String(a.groupId)===String(row.groupId) && !a.locked;
        });
        if (rec) _fireSyncForSession(sessKey, rec.session, Number(row.subjectId), Number(row.groupId));
        else idbDeleteSession(sessKey);
      } else if (!window._pendingSessions[sessKey]) {
        const timer = setTimeout(function() {
          _fireSyncForSession(sessKey, row.session, Number(row.subjectId), Number(row.groupId));
        }, remaining);
        window._pendingSessions[sessKey] = {
          session: row.session, subjectId: Number(row.subjectId),
          groupId: Number(row.groupId), timer, startedAt: row.startedAt, delay: EDIT_MS
        };
      }
    });
  }).catch(function() {
    // Fallback: إذا فشل IDB استخدم state فقط
    var activeSessions = {};
    (state.attendance||[]).forEach(function(a) {
      if (!a.locked && a.savedAt && (now-a.savedAt<EDIT_MS)) {
        var k=a.subjectId+'-'+a.groupId;
        if (!activeSessions[k]) activeSessions[k]=a;
      }
    });
    Object.values(activeSessions).forEach(function(a) {
      var sk=a.subjectId+'-'+a.groupId;
      var rem=EDIT_MS-(now-a.savedAt);
      if (rem>0 && !window._pendingSessions[sk]) {
        var t=setTimeout(function(){ _fireSyncForSession(sk,a.session,a.subjectId,a.groupId); },rem);
        window._pendingSessions[sk]={session:a.session,subjectId:a.subjectId,groupId:a.groupId,timer:t,startedAt:a.savedAt,delay:EDIT_MS};
      }
    });
  });
}

// تشغيل الاستعادة فوراً عند التحميل
restorePendingTimers();

function refreshCurrentView() {
  const active = document.querySelector('.nav-tab.active');

    else if (nav.stage) renderGroups(nav.stage);
    else renderStages();

  else if (tab === 'settings') renderSettings();
}

function openModal(title, bodyHTML, callback) {

  document.getElementById('modalBody').innerHTML = bodyHTML;

// ===================== ID =====================
function nextId() { return state.nextId++; }

// ===================== NAV =====================
let nav = {stage:null,group:null,subject:null};

function renderBreadcrumb() {
  const el = document.getElementById('breadcrumb');
  let items = [`<span class="bc-item" onclick="navTo('stages')">🏠 الرئيسية</span>`];
  if (nav.stage) { const s=state.stages.find(x=>x.id===nav.stage); if(s) items.push(`<span class="bc-sep">›</span><span class="bc-item" onclick="navTo('groups')">${s.name}</span>`); }
  if (nav.group) { const g=state.groups.find(x=>x.id===nav.group); if(g) items.push(`<span class="bc-sep">›</span><span class="bc-item" onclick="navTo('subjects')">${g.name}</span>`); }
  if (nav.subject) { const s=state.subjects.find(x=>x.id===nav.subject); if(s) items.push(`<span class="bc-sep">›</span><span class="bc-item active">${s.name}</span>`); }
  el.innerHTML = items.join('');
}

function navTo(level) {
  if (level==='stages') { nav={stage:null,group:null,subject:null}; renderStages(); }
  else if (level==='groups') { nav.group=null; nav.subject=null; renderGroups(nav.stage); }
  else if (level==='subjects') { nav.subject=null; if(nav.group===0) renderSubjectsNoGroup(nav.stage); else renderSubjects(nav.stage,nav.group); }
}

// ===================== STAGES =====================
function renderStages() {
  nav={stage:null,group:null,subject:null}; renderBreadcrumb();
  const stages = state.stages||[];
  let html = `<div class="cards-header"><div class="cards-title">المراحل الدراسية <span>(${stages.length})</span></div><button class="btn-add" onclick="addStage()">＋ إضافة مرحلة</button></div><div class="cards-grid">`;
  if (!stages.length) html += `<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">🎓</div><p>لا توجد مراحل. أضف مرحلة للبدء.</p></div>`;
  else stages.forEach((s,i)=>{
    const gCount=(state.groups||[]).filter(g=>g.stageId===s.id).length;
    const stCount=(state.students||[]).filter(st=>st.stageId===s.id).length;
    html+=`<div class="card" onclick="clickStage(${s.id})"><div class="card-actions"><button class="card-action-btn ca-edit" onclick="event.stopPropagation();editStage(${s.id})">✏️</button><button class="card-action-btn ca-del" onclick="event.stopPropagation();deleteStage(${s.id})">🗑️</button></div><div class="card-icon">🎓</div><div class="card-name">${s.name}</div><div class="card-meta">${gCount} كروب · ${stCount} طالب</div><div class="card-accent color-${i%5}"></div></div>`;
  });
  html += `</div>`;
  document.getElementById('content-area').innerHTML = html;
}

function addStage() {
  openModal('➕ إضافة مرحلة',`<div class="form-group"><label class="form-label">اسم المرحلة</label><input class="form-input" id="inp-name" placeholder="مثال: المرحلة الأولى"></div>`,()=>{
    const name=document.getElementById('inp-name').value.trim();
    if(!name){toast('أدخل الاسم','error');return;}
    if(!state.stages) state.stages=[];
    const newId=nextId();
    state.stages.push({id:newId,name}); save(); closeModal();
    // بعد إنشاء المرحلة مباشرة → انتقل لواجهة الكروب مع إظهار زر التخطي
    nav.stage=newId; nav.group=null; nav.subject=null;
    renderGroups(newId, true);
    toast('تمت إضافة المرحلة');
  });
}
function editStage(id) {
  const s=state.stages.find(x=>x.id===id);
  openModal('✏️ تعديل المرحلة',`<div class="form-group"><label class="form-label">اسم المرحلة</label><input class="form-input" id="inp-name" value="${s.name}"></div>`,()=>{
    const name=document.getElementById('inp-name').value.trim();
    if(!name){toast('أدخل الاسم','error');return;}
    s.name=name; save(); closeModal(); renderStages(); toast('تم التعديل');
  });
}
function deleteStage(id) {
  if(!confirm('حذف المرحلة وكل بياناتها؟')) return;
  state.stages=state.stages.filter(x=>x.id!==id);
  state.groups=(state.groups||[]).filter(x=>x.stageId!==id);
  const subs=(state.subjects||[]).filter(x=>x.stageId===id).map(x=>x.id);
  state.subjects=(state.subjects||[]).filter(x=>x.stageId!==id);
  state.students=(state.students||[]).filter(x=>x.stageId!==id);
  state.attendance=(state.attendance||[]).filter(x=>!subs.includes(x.subjectId));
  save(); renderStages(); toast('تم الحذف','error');
}

// ===================== GROUPS =====================
function clickStage(stageId) {
  nav.stage=stageId; nav.group=null; nav.subject=null;
  const hasGroups=(state.groups||[]).some(function(g){ return g.stageId===stageId; });
  if(!hasGroups) {
    // لا كروبات → افتح المواد مباشرة بدون المرور بشاشة الكروبات
    nav.group=0;
    renderSubjectsNoGroup(stageId);
  } else {
    renderGroups(stageId);
  }
}
function renderGroups(stageId, isNew) {
  const stage=state.stages.find(s=>s.id===stageId); renderBreadcrumb();
  const groups=(state.groups||[]).filter(g=>g.stageId===stageId);
  // زر "تخطي" يظهر فقط عند إنشاء مرحلة جديدة (isNew=true)، وليس عند الدخول لمرحلة موجودة
  const skipBtn=isNew?`<button onclick="skipGroupToSubjects(${stageId})" style="padding:9px 18px;border-radius:10px;background:var(--glass2);border:1px solid var(--border);color:var(--text2);font-family:Tajawal;font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">⏭ تخطي — عرض المواد مباشرة</button>`:'';
  let html=`<div class="cards-header"><div class="cards-title">كروبات <span>${stage?.name}</span></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn-add" onclick="addGroup(${stageId})">＋ إضافة كروب</button>${skipBtn}</div></div><div class="cards-grid">`;
  if(!groups.length) html+=`<div class="empty-state" style="grid-column:1/-1"><div class="es-icon">👥</div><p>لا توجد كروبات. يمكنك إضافة كروب أو تخطي هذه الخطوة للمواد مباشرة.</p></div>`;
  else groups.forEach((g,i)=>{
    const stCount=(state.students||[]).filter(st=>st.groupId===g.id).length;
    html+=`<div class="card" onclick="clickGroup(${g.id})"><div class="card-actions"><button class="card-action-btn ca-edit" onclick="event.stopPropagation();editGroup(${g.id})">✏️</button><button class="card-action-btn ca-del" onclick="event.stopPropagation();deleteGroup(${g.id})">🗑️</button></div><div class="card-icon">👥</div><div class="card-name">${g.name}</div><div class="card-meta">${stCount} طالب</div><div class="card-accent color-${(i+2)%5}"></div></div>`;
  });

// ===================== ATTENDANCE =====================
function clickSubject(subjectId,groupId) { nav.subject=subjectId; renderAttendance(subjectId,groupId); }

function renderAttendance(subjectId,groupId) {
  renderBreadcrumb();
  const subject=(state.subjects||[]).find(s=>s.id===subjectId);
  const group=(state.groups||[]).find(g=>g.id===groupId);
  const stage=(state.stages||[]).find(s=>s.id===nav.stage);
  const students=(state.students||[]).filter(st=>st.stageId===nav.stage&&st.groupId===groupId);
  const now=new Date();
  const dateStr=now.toLocaleDateString('ar-IQ',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const timeStr=now.toLocaleTimeString('ar-IQ',{hour:'2-digit',minute:'2-digit'});
  window._sessionAtt=window._sessionAtt||{};
  const sessKey=`${subjectId}-${groupId}`;
  // دائماً أعد بناء _sessionAtt من السجلات القابلة للتعديل الحالية فقط
  // هذا يضمن استقلالية كل جلسة عن الجلسات السابقة
  const _nowMs=Date.now(), _EDIT=15*60*1000;
  const _activeRecs=(state.attendance||[]).filter(function(a){
    return a.subjectId===subjectId && a.groupId===groupId && !a.locked && a.savedAt && (_nowMs-a.savedAt<_EDIT);
  });
  if(_activeRecs.length>0) {
    // توجد جلسة نشطة قابلة للتعديل — احتفظ بالبيانات أو أعد تحميلها
    window._sessionAtt[sessKey]={};
    _activeRecs.forEach(function(r){
      window._sessionAtt[sessKey][r.studentId]=r.status;
      if(r.note) window._sessionAtt[sessKey][r.studentId+'_note']=r.note;
    });
  } else {
    // لا توجد جلسة نشطة — امسح البيانات القديمة لأن الجلسة السابقة انتهت
    window._sessionAtt[sessKey]={};
  }
  // تحقق من وجود سجلات محفوظة نهائياً أو منتهية الوقت (لعرض إشعار للمستخدم)
  const _lockedRecs=(state.attendance||[]).filter(function(a){
    return a.subjectId===subjectId && a.groupId===groupId && (a.locked || (a.savedAt && (_nowMs-a.savedAt>=_EDIT)));
  });
  const _hasLockedPrev=_lockedRecs.length>0 && _activeRecs.length===0;
  students.forEach(st=>{ const v=window._sessionAtt[sessKey][st.id]; if(v==='present') pCnt++; else if(v==='absent') aCnt++; });

  // حساب الوقت المتبقي للتعديل بشكل مستقل لكل سجل
  const EDIT_MS=15*60*1000;
  const nowMs2=Date.now();
  const editRecs=(state.attendance||[]).filter(function(a){
    return a.subjectId===subjectId && a.groupId===groupId && !a.locked && a.savedAt && (nowMs2-a.savedAt<EDIT_MS);
  });
  const hasActiveSession=editRecs.length>0;
  const savedAtMs=hasActiveSession?editRecs[0].savedAt:0;
  const remainingMs=hasActiveSession?Math.max(0,EDIT_MS-(nowMs2-savedAtMs)):0;
  const remainMins=Math.floor(remainingMs/60000);
  const remainSecs=Math.floor((remainingMs%60000)/1000);
  const timerDisplay=hasActiveSession
    ? `<div id="edit-timer" style="background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.4);border-radius:10px;padding:8px 14px;text-align:center;min-width:110px;">
        <div style="font-size:11px;color:var(--accent4);font-weight:700;margin-bottom:2px;">⏱ وقت التعديل</div>
        <div id="timer-display" style="font-size:22px;font-weight:800;color:var(--accent4);font-variant-numeric:tabular-nums;">${String(remainMins).padStart(2,'0')}:${String(remainSecs).padStart(2,'0')}</div>
        <div style="font-size:10px;color:var(--text3);">دقيقة : ثانية</div>
       </div>`
    : '';
  let html=`<div class="att-header">
    <div class="att-info"><h2>${subject?.name}</h2><p>${stage?.name} · ${group?.name} · ${students.length} طالب</p></div>
    <div class="att-date-info"><strong>${timeStr}</strong>${dateStr}</div>
    <div class="att-stats">
      <div class="stat-box"><div class="stat-num green" id="present-cnt">${pCnt}</div><div class="stat-label">حاضر</div></div>
      <div class="stat-box"><div class="stat-num red" id="absent-cnt">${aCnt}</div><div class="stat-label">غائب</div></div>
      <div class="stat-box"><div class="stat-num" style="color:var(--text2)">${students.length-pCnt-aCnt}</div><div class="stat-label">لم يُسجَّل</div></div>
    </div>
    ${timerDisplay}
    <div style="display:flex;flex-direction:column;gap:8px;align-items:stretch">
      <button class="btn-save-all" onclick="saveAttendance(${subjectId},${groupId},false)" style="background:linear-gradient(135deg,var(--accent),#6ba3ff);">⏱ حفظ مع إمكانية التعديل</button>
      <button class="btn-save-all" onclick="saveAttendance(${subjectId},${groupId},true)" style="background:linear-gradient(135deg,#7c3aed,#a855f7);">🔒 حفظ نهائي غير قابل للتعديل</button>
      <button onclick="resetAttendance('${sessKey}',${subjectId},${groupId})" style="padding:8px 16px;border-radius:10px;background:var(--glass2);border:1px solid var(--border);color:var(--text2);font-family:Tajawal;font-size:13px;font-weight:700;cursor:pointer;">↺ إعادة تعيين</button>
    </div>
  </div>
  ${_hasLockedPrev ? `<div style="background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.3);border-radius:12px;padding:12px 18px;margin-bottom:16px;display:flex;align-items:center;gap:10px;"><span style="font-size:20px;">🆕</span><div><div style="font-weight:700;color:var(--accent2);font-size:14px;">جلسة حضور جديدة ومستقلة</div><div style="font-size:12px;color:var(--text2);margin-top:2px;">السجلات السابقة لهذه المادة محفوظة في "سجل المادة" — هذه جلسة جديدة مستقلة تماماً.</div></div></div>` : ''}
  <div class="att-tabs">
    <button class="att-tab active" id="tab-current" onclick="switchAttTab('current',${subjectId},${groupId})">📝 تسجيل الحضور</button>
    <button class="att-tab" id="tab-history" onclick="switchAttTab('history',${subjectId},${groupId})">📋 سجل المادة</button>
  </div>
  <div id="att-panel-current">
    <div class="search-bar">
      <input class="search-input" id="student-search" placeholder="🔍 ابحث عن طالب..." oninput="filterStudents()">
      <button class="btn-add" onclick="addStudentToGroup(${nav.stage},${groupId})">＋ إضافة طالب</button>
      <button style="padding:9px 14px;border-radius:10px;background:var(--glass2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:Tajawal;font-size:13px;" onclick="markAll('present',${subjectId},${groupId})">✅ حضور الكل</button>
      <button style="padding:9px 14px;border-radius:10px;background:var(--glass2);border:1px solid var(--border);color:var(--text2);cursor:pointer;font-family:Tajawal;font-size:13px;" onclick="markAll('absent',${subjectId},${groupId})">❌ غياب الكل</button>
    </div>`;
  if(!students.length) html+=`<div class="empty-state"><div class="es-icon">🎓</div><p>لا يوجد طلاب في هذا الكروب.</p></div>`;
  else {
    html+=`<div class="table-wrap"><table class="att-table"><thead><tr><th>#</th><th>اسم الطالب</th><th>الحالة</th><th>ملاحظات</th></tr></thead><tbody id="students-tbody">`;
    students.forEach((st,idx)=>{
      const v=window._sessionAtt[sessKey][st.id];
      const note=window._sessionAtt[sessKey][st.id+'_note']||'';
      html+=`<tr id="row-${st.id}"><td class="row-num">${idx+1}</td><td class="student-name">${st.name}</td><td><div class="att-toggle"><button class="att-btn present-btn ${v==='present'?'active':''}" onclick="setAtt(${st.id},'present','${sessKey}',${subjectId},${groupId})">✅ حاضر</button><button class="att-btn absent-btn ${v==='absent'?'active':''}" onclick="setAtt(${st.id},'absent','${sessKey}',${subjectId},${groupId})">❌ غائب</button></div></td><td><input class="note-input" placeholder="ملاحظة..." value="${note}" oninput="setNote(${st.id},'${sessKey}',this.value)"></td></tr>`;
    });
    html+=`</tbody></table></div>`;
  }
  html+=`</div><div id="att-panel-history" style="display:none">${buildSubjectHistory(subjectId,groupId)}</div>`;
  document.getElementById('content-area').innerHTML=html;

  // تشغيل العداد التنازلي المستقل لهذا السجل فقط
  if(hasActiveSession) {
    if(window._attTimerInterval) clearInterval(window._attTimerInterval);
    window._attTimerInterval = setInterval(function() {
      const el = document.getElementById('timer-display');
      const timerBox = document.getElementById('edit-timer');
      if(!el) { clearInterval(window._attTimerInterval); return; }
      const nowT = Date.now();
      const remMs = Math.max(0, EDIT_MS - (nowT - savedAtMs));
      const m = Math.floor(remMs / 60000);
      const s = Math.floor((remMs % 60000) / 1000);
      el.textContent = String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
      if(remMs <= 60000 && timerBox) timerBox.style.background = 'rgba(239,68,68,.15)';
      if(remMs <= 0) {
        clearInterval(window._attTimerInterval);
        if(timerBox) timerBox.innerHTML = '<div style="font-size:12px;color:var(--absent);font-weight:700;">🔒 انتهى وقت التعديل</div>';
      }
    }, 1000);
  } else {
    if(window._attTimerInterval) clearInterval(window._attTimerInterval);
  }
}

function switchAttTab(tab,subjectId,groupId) {
  document.getElementById('tab-current').classList.toggle('active',tab==='current');
  document.getElementById('tab-history').classList.toggle('active',tab==='history');
  document.getElementById('att-panel-current').style.display=tab==='current'?'block':'none';
  document.getElementById('att-panel-history').style.display=tab==='history'?'block':'none';
}

function buildSubjectHistory(subjectId,groupId) {
  const sessions=[...new Set((state.attendance||[]).filter(a=>a.subjectId===subjectId&&a.groupId===groupId).map(a=>a.session))].sort().reverse();
  if(!sessions.length) return `<div class="empty-state"><div class="es-icon">📋</div><p>لا يوجد سجل بعد.</p></div>`;
  const now=Date.now();
  const EDIT_MS=15*60*1000;
  let html=`<div class="history-list">`;
  sessions.forEach(sess=>{
    const records=(state.attendance||[]).filter(a=>a.subjectId===subjectId&&a.groupId===groupId&&a.session===sess);
    const p=records.filter(r=>r.status==='present').length;
    const a=records.filter(r=>r.status==='absent').length;
    // check if any record in this session is still editable
    const sessTime=records[0]?.savedAt||(records[0]?.id||0);
    const editable=records[0]?.savedAt && (now - records[0].savedAt < EDIT_MS);
    const remaining=editable?Math.ceil((EDIT_MS-(now-records[0].savedAt))/60000):0;
    const isLocked=records[0]?.locked;
    html+=`<div class="history-item"><div class="hi-top"><div class="hi-name">📅 ${records[0]?.date} — ${records[0]?.time}`;
    if(isLocked) html+=` <span style="font-size:11px;background:rgba(124,58,237,.2);color:#a855f7;border-radius:8px;padding:2px 8px;font-weight:600;">🔒 محفوظ نهائياً</span>`;
    else if(editable) html+=` <span style="font-size:11px;background:rgba(251,191,36,.2);color:var(--accent4);border-radius:8px;padding:2px 8px;font-weight:600;">⏱ متاح التعديل (${remaining} د)</span>`;
    html+=`</div><div style="display:flex;gap:8px"><span class="status-badge badge-present">✅ ${p}</span><span class="status-badge badge-absent">❌ ${a}</span></div></div>`;
    html+=`<div class="hi-detail" style="margin-top:8px;display:flex;flex-direction:column;gap:6px">`;
    records.forEach(r=>{
      const st=(state.students||[]).find(s=>s.id===r.studentId);
      const canEdit=!r.locked && r.savedAt && (now-r.savedAt < EDIT_MS);
      html+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)">`;
      html+=`<span>${r.status==='absent'?'❌':'✅'} ${st?.name||'؟'}${r.note?' ('+r.note+')':''}</span>`;
      if(canEdit){
        if(r.status==='absent'){
          html+=`<button onclick="changeAttRecord(${r.id},'present',${subjectId},${groupId})" style="padding:3px 10px;border-radius:7px;background:rgba(16,185,129,.2);color:var(--present);border:none;cursor:pointer;font-family:Tajawal;font-size:12px;font-weight:600;">تغيير ← حاضر</button>`;
        } else {
          html+=`<button onclick="changeAttRecord(${r.id},'absent',${subjectId},${groupId})" style="padding:3px 10px;border-radius:7px;background:rgba(239,68,68,.2);color:var(--absent);border:none;cursor:pointer;font-family:Tajawal;font-size:12px;font-weight:600;">تغيير ← غائب</button>`;
        }
      }
      html+=`</div>`;
    });
    html+=`</div></div>`;
  });
  return html+`</div>`;
}

function setAtt(studentId,status,sessKey,subjectId,groupId) {
  if(!window._sessionAtt[sessKey]) window._sessionAtt[sessKey]={};
  window._sessionAtt[sessKey][studentId]=status;
  const row=document.getElementById('row-'+studentId);
  if(row){ row.querySelectorAll('.att-btn').forEach(b=>b.classList.remove('active')); const btn=status==='present'?row.querySelector('.present-btn'):row.querySelector('.absent-btn'); if(btn) btn.classList.add('active'); }
  updateStatCounts(sessKey,subjectId,groupId);
}
function setNote(studentId,sessKey,val) { if(!window._sessionAtt[sessKey]) window._sessionAtt[sessKey]={}; window._sessionAtt[sessKey][studentId+'_note']=val; }
function updateStatCounts(sessKey,subjectId,groupId) {
  const students=(state.students||[]).filter(st=>st.stageId===nav.stage&&st.groupId===groupId);
  let p=0,a=0;
  students.forEach(st=>{ const v=window._sessionAtt[sessKey]?.[st.id]; if(v==='present') p++; else if(v==='absent') a++; });
  const e1=document.getElementById('present-cnt'); const e2=document.getElementById('absent-cnt');
  if(e1) e1.textContent=p; if(e2) e2.textContent=a;
}
function markAll(status,subjectId,groupId) {
  const sessKey=`${subjectId}-${groupId}`;
  (state.students||[]).filter(st=>st.stageId===nav.stage&&st.groupId===groupId).forEach(st=>setAtt(st.id,status,sessKey,subjectId,groupId));
}
function resetAttendance(sessKey,subjectId,groupId) {
  if(!confirm('هل تريد إعادة تعيين جميع الاختيارات؟')) return;
  window._sessionAtt[sessKey]={};
  renderAttendance(subjectId,groupId);
  toast('تم إعادة التعيين','info');
}
function saveAttendance(subjectId,groupId,isFinal) {
  const sessKey=subjectId+'-'+groupId;
  const students=(state.students||[]).filter(function(st){ return st.stageId===nav.stage&&st.groupId===groupId; });
  const now=new Date();
  if(!state.attendance) state.attendance=[];

  // Check if there is an existing editable (non-locked) session for this subject+group within 15 min
  const EDIT_MS=15*60*1000;
  const nowMs=now.getTime();
  const existingRecs=(state.attendance||[]).filter(function(a){
    return a.subjectId===subjectId && a.groupId===groupId && !a.locked && a.savedAt && (nowMs - a.savedAt < EDIT_MS);
  });
  const existingSession=existingRecs.length ? existingRecs[0].session : null;

  let count=0;

  if(existingSession) {
    // UPDATE existing session records — do NOT change savedAt (keep the original timer running)
    students.forEach(function(st){
      const status=window._sessionAtt[sessKey]?.[st.id];
      if(!status) return;
      const note=window._sessionAtt[sessKey]?.[st.id+'_note']||'';
      const existRec=(state.attendance||[]).find(function(a){ return a.session===existingSession && a.studentId===st.id; });
      if(existRec){
        // Update the existing record in place
        existRec.status=status;
        existRec.note=note;
        existRec.locked=isFinal?true:false;
        existRec.synced=false;
      } else {
        // Student wasn't in original save, add new record to same session
        state.attendance.push({id:nextId(),studentId:st.id,subjectId:subjectId,groupId:groupId,stageId:nav.stage,status:status,note:note,session:existingSession,date:existingRecs[0].date,time:existingRecs[0].time,savedAt:existingRecs[0].savedAt,synced:false,locked:isFinal?true:false});
      }
      count++;
    });
    // Lock all records in session if final
    if(isFinal){
      (state.attendance||[]).filter(function(a){ return a.session===existingSession; }).forEach(function(a){ a.locked=true; a.synced=true; });
    }
    if(isFinal){
      // حفظ نهائي: أطلق الإرسال الفوري وأنهِ الجلسة
      _fireSyncForSession(sessKey, existingSession, subjectId, groupId);
      toast('🔒 تم الحفظ النهائي وإرساله لـ Firebase فوراً ('+count+' سجل)');
    } else {
      // أعد تحميل _sessionAtt من السجلات المحفوظة حتى تبقى الأزرار محددة ولا يبدأ العداد من جديد
      window._sessionAtt[sessKey]={};
      (state.attendance||[]).filter(function(a){ return a.session===existingSession; }).forEach(function(r){
        window._sessionAtt[sessKey][r.studentId]=r.status;
        if(r.note) window._sessionAtt[sessKey][r.studentId+'_note']=r.note;
      });
      save(true);
      // إعادة استخدام المؤقت الموجود دون إعادة تشغيل الـ15 دقيقة
      if(!window._pendingSessions[sessKey]){
        scheduleFirebaseSync(existingSession, subjectId, groupId);
      }
      toast('✏️ تم تحديث '+count+' سجل — الوقت المتبقي لم يتغير');
    }
  } else {
    // جلسة جديدة
    const session=now.toISOString();
    const date=now.toLocaleDateString('ar-IQ',{year:'numeric',month:'2-digit',day:'2-digit'});
    const time=now.toLocaleTimeString('ar-IQ',{hour:'2-digit',minute:'2-digit'});
    students.forEach(function(st){
      const status=window._sessionAtt[sessKey]?.[st.id];
      if(!status) return;
      const note=window._sessionAtt[sessKey]?.[st.id+'_note']||'';
      state.attendance.push({id:nextId(),studentId:st.id,subjectId:subjectId,groupId:groupId,stageId:nav.stage,status:status,note:note,session:session,date:date,time:time,savedAt:nowMs,synced:isFinal?true:false,locked:isFinal?true:false});
      count++;
    });
    if(isFinal){
      // حفظ نهائي: أطلق الإرسال الفوري وأنهِ الجلسة
      _fireSyncForSession(sessKey, session, subjectId, groupId);
      toast('🔒 تم الحفظ النهائي وإرساله لـ Firebase فوراً ('+count+' سجل)');
    } else {
      // أعد تحميل _sessionAtt من السجلات المحفوظة
      window._sessionAtt[sessKey]={};
      (state.attendance||[]).filter(function(a){ return a.session===session; }).forEach(function(r){
        window._sessionAtt[sessKey][r.studentId]=r.status;
        if(r.note) window._sessionAtt[sessKey][r.studentId+'_note']=r.note;
      });
      save(true);
      scheduleFirebaseSync(session, subjectId, groupId);
      toast('⏱ تم حفظ '+count+' سجل — يمكن التعديل خلال 15 دقيقة');
    }
  }
  setTimeout(function(){ renderAttendance(subjectId,groupId); },300);
}
function changeAttRecord(recordId, newStatus, subjectId, groupId) {
  const rec = (state.attendance||[]).find(function(r){ return r.id===recordId; });
  if(!rec){toast('السجل غير موجود','error');return;}
  if(rec.locked){toast('🔒 هذا السجل محفوظ نهائياً ولا يمكن تعديله','error');return;}
  const now=Date.now();
  const savedAt=rec.savedAt||0;
  if(now-savedAt > 15*60*1000){toast('⏱ انتهت مدة التعديل (15 دقيقة)','error');renderAttendance(subjectId,groupId);return;}
  // Update the record in place — only the modified state is stored, no duplicate
  rec.status=newStatus;
  rec.synced=false;
  // Save locally without sending to Firebase — the scheduled 15-min timer will send the final state
  save(true);
  toast('✅ تم تعديل الحالة — سيُرسل للـ Firebase عند انتهاء وقت الجلسة');
  renderAttendance(subjectId,groupId);
}

function renderReports() {

function exportStageExcel(stageId) {
  const stage=(state.stages||[]).find(s=>s.id===stageId);
  const students=(state.students||[]).filter(s=>s.stageId===stageId);
  const subjects=(state.subjects||[]).filter(s=>s.stageId===stageId);
  const groups=(state.groups||[]).filter(g=>g.stageId===stageId);
  const wb=XLSX.utils.book_new();
  const summaryRows=[['اسم الطالب','الكروب','عدد الغيابات','نسبة الغياب']];
  students.forEach(st=>{
    const absCount=(state.attendance||[]).filter(a=>a.studentId===st.id&&a.status==='absent').length;
    const total=(state.attendance||[]).filter(a=>a.studentId===st.id).length;
    const group=groups.find(g=>g.id===st.groupId);
    summaryRows.push([st.name,group?.name||'',absCount,total?Math.round(absCount/total*100)+'%':'0%']);
  });
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(summaryRows),'ملخص الغيابات');
  subjects.forEach(sub=>{
    const rows=[['اسم الطالب','الكروب','التاريخ','الوقت','الحالة','ملاحظات']];
    (state.attendance||[]).filter(a=>a.subjectId===sub.id).forEach(a=>{
      const st=students.find(s=>s.id===a.studentId);
      const g=groups.find(g=>g.id===a.groupId);
      rows.push([st?.name||'؟',g?.name||'',a.date,a.time,a.status==='absent'?'غائب':'حاضر',a.note||'']);
    });
    XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),sub.name.substring(0,28));
  });
  XLSX.writeFile(wb,`غيابات_${stage?.name}_${new Date().toLocaleDateString('en')}.xlsx`);
  toast(`تم تصدير Excel للمرحلة: ${stage?.name} ✅`);
}

function clearHistFilters() {

function renderHistory() {
  populateHistFilters();
  const selStage=document.getElementById('hist-stage')?.value||'';
  const selGroup=document.getElementById('hist-group')?.value||'';
  const selSubj=document.getElementById('hist-subject')?.value||'';
  const selStudent=(document.getElementById('hist-student')?.value||'').trim().toLowerCase();
  let atts=[...(state.attendance||[])].sort((a,b)=>b.id-a.id);
  if(selStage) atts=atts.filter(a=>String(a.stageId)===selStage);
  if(selGroup) atts=atts.filter(a=>String(a.groupId)===selGroup);
  if(selSubj) atts=atts.filter(a=>String(a.subjectId)===selSubj);
  if(selStudent) {
    const matchIds=(state.students||[]).filter(s=>s.name.toLowerCase().includes(selStudent)).map(s=>s.id);
    atts=atts.filter(a=>matchIds.includes(a.studentId));
  }
  if(!atts.length){document.getElementById('history-content').innerHTML=`<div class="empty-state"><div class="es-icon">📋</div><p>لا يوجد سجل مطابق.</p></div>`;return;}
  const sessions=[...new Set(atts.map(a=>a.session))];
  let html=`<div class="history-list" style="max-height:none">`;
  sessions.slice(0,100).forEach(sess=>{
    const records=atts.filter(a=>a.session===sess);
    const sub=(state.subjects||[]).find(s=>s.id===records[0]?.subjectId);
    const stage=(state.stages||[]).find(s=>s.id===records[0]?.stageId);
    const group=(state.groups||[]).find(g=>g.id===records[0]?.groupId);
    const p=records.filter(r=>r.status==='present').length;
    const a=records.filter(r=>r.status==='absent').length;
    html+=`<div class="history-item"><div class="hi-top"><div><div class="hi-name">📖 ${sub?.name||'؟'} · ${stage?.name||'؟'} · ${group?.name||'؟'}</div><div class="hi-date">📅 ${records[0]?.date} — 🕐 ${records[0]?.time}</div></div><div style="display:flex;gap:8px;align-items:center"><span class="status-badge badge-present">✅ ${p}</span><span class="status-badge badge-absent">❌ ${a}</span></div></div>`;
    if(selStudent){
      // show all matched students in this session
      const shown=records.filter(r=>{const st=(state.students||[]).find(s=>s.id===r.studentId);return st&&st.name.toLowerCase().includes(selStudent);});
      html+=`<div class="hi-detail" style="margin-top:6px">${shown.map(r=>{const st=(state.students||[]).find(s=>s.id===r.studentId);return `<span style="margin-left:8px">${r.status==='absent'?'❌':'✅'} ${st?.name||'؟'}${r.note?'('+r.note+')':''}</span>`;}).join('')}</div>`;
    } else if(a){
      html+=`<div class="hi-detail" style="margin-top:6px">الغائبون: ${records.filter(r=>r.status==='absent').map(r=>{const st=(state.students||[]).find(s=>s.id===r.studentId);return `<span style="margin-left:8px">👤${st?.name||'؟'}${r.note?'('+r.note+')':''}</span>`;}).join('')}</div>`;
    }
    html+=`</div>`;
  });
  html+=`</div>`;
  document.getElementById('history-content').innerHTML=html;
}

    Array.from(groupSel.options).forEach(function(opt){
      if(!opt.value) return;
      const grp=(state.groups||[]).find(function(g){ return String(g.id)===opt.value; });
      opt.style.display=(grp && String(grp.stageId)===selStage)?'':'none';
    });
  } else if(groupSel){
    Array.from(groupSel.options).forEach(function(opt){ opt.style.display=''; });
  }
  document.querySelectorAll('.student-si').forEach(function(el){
    const name=el.querySelector('.si-info')?.textContent.toLowerCase()||'';
    const stageMatch=!selStage || el.dataset.stage===selStage;
    const groupMatch=!selGroup || el.dataset.group===selGroup;
    const nameMatch=!q || name.includes(q);
    el.style.display=(stageMatch&&groupMatch&&nameMatch)?'':'none';
  });
}
function clearAllAttendance() {
  const code = prompt('🔒 أدخل الرمز السري لمسح سجلات الغيابات:');
  if (code === null) return;
  if (code !== 'student0191') { toast('❌ الرمز السري غير صحيح', 'error'); return; }
  if(!confirm('مسح كل سجلات الغيابات؟')) return;
  state.attendance=[]; save(); renderSettings(); toast('تم المسح','info');
}

// ===================== PWA INSTALL BANNER =====================
let deferredPrompt = null;
const pwaBanner = document.getElementById('pwaBanner');
const pwaInstallBtn = document.getElementById('pwaInstallBtn');
const pwaDismissBtn = document.getElementById('pwaDismissBtn');

function showPwaBanner() {
  if (localStorage.getItem('pwaDismissed')) return;
  setTimeout(() => { pwaBanner.classList.add('show'); }, 1500);
}

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  showPwaBanner();
});

// For iOS/Safari - show banner if not in standalone mode
if (window.navigator.standalone === false || 
    (window.matchMedia && !window.matchMedia('(display-mode: standalone)').matches)) {
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
  const isSafari = /safari/i.test(navigator.userAgent) && !/chrome/i.test(navigator.userAgent);
  if (isIOS && isSafari && !localStorage.getItem('pwaDismissed')) {
    setTimeout(() => { pwaBanner.classList.add('show'); }, 1500);
    pwaInstallBtn.textContent = '📲 كيفية التثبيت';
    pwaInstallBtn.onclick = () => {
      alert('لتثبيت التطبيق على iOS:\n١. اضغط على زر المشاركة ٢. اختر "إضافة إلى الشاشة الرئيسية"');
    };
  }
}

if (pwaInstallBtn) {
  pwaInstallBtn.addEventListener('click', async () => {
    if (deferredPrompt) {
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      pwaBanner.classList.remove('show');
      if (outcome === 'accepted') toast('تم تثبيت التطبيق بنجاح 🎉');
    }
  });
}

if (pwaDismissBtn) {
  pwaDismissBtn.addEventListener('click', () => {
    pwaBanner.classList.remove('show');
    localStorage.setItem('pwaDismissed', '1');
  });
}

window.addEventListener('appinstalled', () => {
  pwaBanner.classList.remove('show');
  deferredPrompt = null;
  toast('تم تثبيت التطبيق على سطح المكتب 🎉');
});

// ===================== SERVICE WORKER =====================
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .catch(err => console.log('SW error:', err));
  });
}

// ===================== INIT =====================
renderStages();
</script>
